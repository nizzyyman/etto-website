<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Semantic openness and dimensionality matrix</title>
  <desc id="desc">A two by two matrix comparing closed and open semantic openness against low and high dimensionality.</desc>
  <rect width="1600" height="1200" fill="#fff"/>

  <g fill="#111" font-family="'ABC Diatype Semi-Mono', 'Courier New', monospace" text-anchor="middle">
    <text x="800" y="128" font-size="32" font-weight="700">semantic openness</text>
    <text x="800" y="174" font-size="28">(how specified &apos;good&apos; is in advance)</text>

    <text x="500" y="300" font-size="28">closed</text>
    <text x="500" y="340" font-size="26">(&quot;good&quot; is defined)</text>
    <text x="1100" y="300" font-size="28">open</text>
    <text x="1100" y="340" font-size="26">(&quot;good&quot; is a stance)</text>

    <text x="284" y="538" font-size="24" transform="rotate(-90 284 538)">low</text>
    <text x="284" y="885" font-size="24" transform="rotate(-90 284 885)">high</text>
    <text x="128" y="650" font-size="28" font-weight="700" transform="rotate(-90 128 650)">dimensionality</text>
    <text x="172" y="650" font-size="26" transform="rotate(-90 172 650)">(signals in play at once)</text>
  </g>

  <g fill="none" stroke="#111" stroke-width="2">
    <rect x="315" y="365" width="525" height="315"/>
    <rect x="925" y="365" width="525" height="315"/>
    <rect x="315" y="765" width="525" height="315"/>
    <rect x="925" y="765" width="525" height="315"/>
  </g>

  <g fill="#111" font-family="'ABC Diatype Semi-Mono', 'Courier New', monospace" font-size="25">
    <text x="495" y="510">• arithmetic</text>
    <text x="495" y="550">• crosswords</text>

    <text x="1040" y="510">• picking a paint color</text>
    <text x="1088" y="550">• playlist names</text>

    <text x="535" y="912">• chess</text>
    <text x="470" y="952">• compiling code</text>

    <text x="1140" y="852">• styling</text>
    <text x="1165" y="892">• A&amp;R</text>
    <text x="1135" y="932">• casting</text>
    <text x="1128" y="972">• curation</text>
    <text x="1095" y="1012">• film direction</text>
  </g>

  <g fill="#111" font-family="'ABC Diatype Semi-Mono', 'Courier New', monospace" font-size="24" text-anchor="middle">
    <text x="578" y="715">few signals, one answer</text>
    <text x="1188" y="715">few signals, many answers work fine</text>
    <text x="578" y="1114">many signals, one objective</text>
    <text x="1188" y="1114">many signals, few right answers</text>
  </g>
</svg>
